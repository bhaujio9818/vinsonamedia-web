name: Daily Auto Scraper Run

on:
  schedule:
    # ⏰ हर रोज़ रात 12 बजे (UTC) / सुबह 5:30 बजे (IST) अपने-आप चलेगा
    - cron: '0 0 * * *'
  workflow_dispatch: # 👈 इससे आप जब चाहें Actions टैब से मैन्युअली (Manual Run) भी चला सकते हैं

jobs:
  run-scraper:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository Code
        uses: actions/checkout@v3

      - name: 🟢 Setup Node.js Environment
        uses: actions/checkout@v3
        with:
          node-version: '18'

      - name: 📦 Install Required Dependencies
        run: |
          npm install firebase axios

      - name: 🚀 Run Multi-Category Scraper Script
        run: |
          node scraper.js
